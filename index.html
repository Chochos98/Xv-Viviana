<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Video</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        #video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scroll-video {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        .scroll-video video {
            position: relative;
            transform: translateY(0);
            transition: transform 0.5s;
        }
        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="video-wrapper">
        <video id="main-video" autoplay muted onclick="enterScrollMode()">
            <source src="inicio.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="scroll-video" id="scroll-video">
            <video id="scrolling-video" autoplay muted>
                <source src="scrollin1.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <video id="scrolling-video-2" autoplay muted>
                <source src="scrollin2.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <video id="scrolling-video-3" autoplay muted>
                <source src="scrollin3.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <video id="scrolling-video-4" autoplay muted>
                <source src="scrollin4.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <button class="overlay" onclick="showCountdown()">Start</button>
        <div id="countdown" class="overlay" style="display:none;">3</div>
    </div>
    <script>
        let scrollStarted = false;
        let currentVideo = 1;
        function enterScrollMode() {
            if (!scrollStarted) {
                scrollStarted = true;
                document.getElementById('main-video').style.display = 'none';
                document.getElementById('scroll-video').style.display = 'block';
                document.getElementById('scrolling-video-' + currentVideo).style.display = 'block';
            }
        }
        window.onscroll = function() {
            let scrollTop = window.scrollY;
            let videoHeight = window.innerHeight;
            currentVideo = Math.floor(scrollTop / videoHeight) + 1;
            for (let i = 1; i <= 4; i++) {
                document.getElementById('scrolling-video-' + i).style.display = (i === currentVideo) ? 'block' : 'none';
            }
        };
        function showCountdown() {
            document.getElementById('countdown').style.display = 'block';
            let count = 3;
            let countdownInterval = setInterval(function() {
                count--;
                document.getElementById('countdown').innerText = count;
                if (count <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('countdown').style.display = 'none';
                    document.getElementById('scroll-video').style.display = 'none';
                }
            }, 1000);
        }
    </script>
</body>
</html>
