<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Video Invitation</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .button {
            background-color: rgba(255, 255, 255, 0.7);
            border: none;
            padding: 15px;
            margin: 10px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            text-align: center;
        }
        .countdown {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <video src="inicio.mp4" autoplay muted loop></video>
    <video src="scrollin1.mp4" autoplay muted loop></video>
    <video src="scrollin2.mp4" autoplay muted loop></video>
    <video src="scrollin3.mp4" autoplay muted loop></video>
    <video src="scrollin4.mp4" autoplay muted></video>
    <div class="overlay">
        <button class="button" onclick="window.open('https://maps.app.goo.gl/VVVYfVskNErYnuwy5', '_blank')">Ver mapa</button>
        <button class="button" onclick="window.open('https://wa.me/?text=Quiero asistir a la invitación', '_blank')">Asistir</button>
        <button class="button">Comparte una foto</button>
    </div>
    <div class="countdown" id="countdown-timer"></div>
    <script>
        const countdownDate = new Date('2026-06-06T00:00:00Z').getTime();
        const countdownInterval = setInterval(() => {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById('countdown-timer').innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            if (distance < 0) {
                clearInterval(countdownInterval);
                document.getElementById('countdown-timer').innerHTML = 'EXPIRED';
            }
        }, 1000);
    </script>
</body>
</html>
